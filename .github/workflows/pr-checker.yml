name: PR Issue Checker
on:
  pull_request:
    types: [opened, edited]

jobs:
  check_pr_description:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check PR Description
        id: check_pr_description
        run: |
          PR_DESCRIPTION="${{ github.event.pull_request.body }}"
          if [[ -z "$PR_DESCRIPTION" ]]; then
            echo "PR description is missing."
            exit 1
          fi

          if [[ ! "$PR_DESCRIPTION" =~ Fixes\ #[0-9]+ ]]; then
            echo "The PR description must include an issue reference in the format 'Fixes #123'."
            echo "##[error]PR description must include 'Fixes #123' (replace 123 with your issue number)."
            exit 1
          fi

          echo "PR description is valid."

      - name: Output result
        run: echo "All checks passed."
